<div class="min-h-screen bg-gray-50">
  <!-- Navbar -->
  <app-navbar></app-navbar>

  <!-- Sidebar - Fixed Position -->
  <app-sidebar 
    class="fixed left-0 z-40"
    style="top: 64px; height: calc(100vh - 64px);"
    [style.width.px]="sidebarCollapsed ? 64 : 256">
  </app-sidebar>
  
  <!-- Main Content - With left margin for sidebar -->
  <main 
    class="overflow-y-auto"
    style="height: calc(100vh - 64px); margin-top: 64px;"
    [style.margin-left.px]="sidebarCollapsed ? 64 : 256">
    <app-main-screen></app-main-screen>
  </main>

  <!-- Music Player -->
  <app-music-player></app-music-player>
</div>

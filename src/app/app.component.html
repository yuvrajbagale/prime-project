<div class="min-h-screen bg-gray-50">
  <!-- Navbar -->
  <app-navbar></app-navbar>

  <!-- Main Container with Sidebar and Main Screen -->
  <div class="flex">
    <!-- Sidebar -->
    <app-sidebar 
      [class.mobile-open]="isMobileMenuOpen"
      class="lg:relative lg:translate-x-0 fixed -translate-x-full transition-transform duration-300 ease-in-out z-40 flex-shrink-0"
    ></app-sidebar>

    <!-- Main Screen -->
    <app-main-screen class="flex-1"></app-main-screen>
  </div>

  <!-- Mobile overlay -->
  <div 
    *ngIf="isMobileMenuOpen" 
    class="fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden"
    (click)="toggleMobileMenu()"
  ></div>
</div>

<aside 
  class="bg-white border-r border-gray-200 transition-all duration-300 ease-in-out h-full relative"
  style="width: 100%; min-width: 64px;"
  [style.max-width.px]="isCollapsed ? 64 : 256">
  <!-- Sidebar Header -->
  <div class="p-4 border-b border-gray-200 h-16 flex items-center">
    <div class="flex items-center justify-between w-full">
      <div [class]="isCollapsed ? 'hidden' : 'flex items-center'">
        <div class="w-8 h-8 bg-red-600 rounded flex items-center justify-center mr-3">
          <span class="text-white font-bold text-sm">G</span>
        </div>
        <span class="text-lg font-semibold text-gray-900">gaana</span>
      </div>
      <button 
        (click)="toggleSidebar()"
        class="p-2 rounded-md hover:bg-gray-100 transition-colors duration-200"
      >
        <i [class]="isCollapsed ? 'pi pi-angle-right' : 'pi pi-angle-left'" class="text-xl text-gray-600"></i>
      </button>
    </div>
  </div>

  <!-- Sidebar Menu -->
  <nav class="p-4 overflow-y-auto" style="height: calc(100% - 8rem);">
    <ul class="space-y-2">
      <!-- Main Navigation -->
      <li class="mb-4">
        <p class="text-xs uppercase text-gray-500 font-semibold mb-2" [class]="isCollapsed ? 'hidden' : ''">Browse</p>
      </li>
      <li *ngFor="let item of menuItems.slice(0, 5)">
        <a 
          [routerLink]="item.routerLink"
          [class]="isActive(item.routerLink) ? 'bg-red-50 text-red-600 border-l-4 border-red-600' : 'text-gray-700 hover:bg-gray-50 hover:text-gray-900'"
          class="flex items-center justify-between p-3 rounded-r-lg transition-all duration-200 group"
        >
          <div class="flex items-center">
            <i [class]="item.icon" class="text-xl w-6"></i>
            <span [class]="isCollapsed ? 'hidden' : 'ml-3'" class="font-medium">{{ item.label }}</span>
          </div>
          <span 
            *ngIf="item.badge && !isCollapsed" 
            class="bg-red-100 text-red-600 text-xs px-2 py-1 rounded-full"
          >
            {{ item.badge }}
          </span>
        </a>
      </li>

      <!-- Music Categories -->
      <li class="mb-4 mt-6">
        <p class="text-xs uppercase text-gray-500 font-semibold mb-2" [class]="isCollapsed ? 'hidden' : ''">Moods & Genres</p>
      </li>
      <li *ngFor="let category of musicCategories">
        <a 
          [routerLink]="category.routerLink"
          class="flex items-center p-3 rounded-r-lg text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition-all duration-200"
        >
          <div class="flex items-center">
            <div class="w-6 h-6 rounded-full mr-3" [style.background-color]="category.color"></div>
            <span [class]="isCollapsed ? 'hidden' : 'font-medium'">{{ category.name }}</span>
          </div>
        </a>
      </li>

      <!-- Library -->
      <li class="mb-4 mt-6">
        <p class="text-xs uppercase text-gray-500 font-semibold mb-2" [class]="isCollapsed ? 'hidden' : ''">Library</p>
      </li>
      <li *ngFor="let item of menuItems.slice(5)">
        <a 
          [routerLink]="item.routerLink"
          [class]="isActive(item.routerLink) ? 'bg-red-50 text-red-600 border-l-4 border-red-600' : 'text-gray-700 hover:bg-gray-50 hover:text-gray-900'"
          class="flex items-center justify-between p-3 rounded-r-lg transition-all duration-200 group"
        >
          <div class="flex items-center">
            <i [class]="item.icon" class="text-xl w-6"></i>
            <span [class]="isCollapsed ? 'hidden' : 'ml-3'" class="font-medium">{{ item.label }}</span>
          </div>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Sidebar Footer -->
  <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-200 h-16 bg-white">
    <div class="flex items-center">
      <div class="w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center">
        <i class="pi pi-user text-sm text-gray-600"></i>
      </div>
      <div [class]="isCollapsed ? 'hidden' : 'ml-3'">
        <p class="text-sm font-medium text-gray-900">User</p>
        <p class="text-xs text-gray-500">Free Plan</p>
      </div>
    </div>
  </div>
</aside>

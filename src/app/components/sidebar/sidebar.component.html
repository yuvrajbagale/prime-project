<aside [class]="isCollapsed ? 'w-16' : 'w-64'" 
        class="bg-white text-gray-900 border-r border-gray-200 transition-all duration-300 ease-in-out">
  <!-- Sidebar Header -->
  <div class="p-4 border-b border-gray-200 h-16 flex items-center">
    <div class="flex items-center justify-between w-full">
      <div [class]="isCollapsed ? 'hidden' : 'flex items-center'">
        <i class="pi pi-briefcase text-blue-600 text-xl mr-3"></i>
        <span class="text-lg font-semibold text-gray-600">Dashboard Pro</span>
      </div>
      <button 
        (click)="toggleSidebar()"
        class="p-2 rounded-md hover:bg-gray-100 transition-colors duration-200"
      >
        <i [class]="isCollapsed ? 'pi pi-angle-right' : 'pi pi-angle-left'" class="text-xl text-gray-600"></i>
      </button>
    </div>
  </div>

  <!-- Sidebar Menu -->
  <nav class="p-4" style="height: calc(100% - 8rem); overflow: hidden;">
    <ul class="space-y-2">
      <li *ngFor="let item of menuItems">
        <a 
          [routerLink]="item.routerLink"
          [class]="isActive(item.routerLink) ? 'bg-blue-50 text-blue-600 border-l-4 border-blue-600' : 'text-gray-700 hover:bg-gray-50 hover:text-gray-900'"
          class="flex items-center justify-between p-3 rounded-r-lg transition-all duration-200 group"
        >
          <div class="flex items-center">
            <i [class]="item.icon" class="text-xl w-6"></i>
            <span [class]="isCollapsed ? 'hidden' : 'ml-3'" class="font-medium">{{ item.label }}</span>
          </div>
          <span 
            *ngIf="item.badge && !isCollapsed" 
            class="bg-blue-100 text-blue-600 text-xs px-2 py-1 rounded-full"
          >
            {{ item.badge }}
          </span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Sidebar Footer -->
  <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-200 h-16 flex items-center">
    <div class="flex items-center">
      <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center">
        <i class="pi pi-user text-sm text-white"></i>
      </div>
      <div [class]="isCollapsed ? 'hidden' : 'ml-3'">
        <p class="text-sm font-medium text-gray-900">Admin User</p>
        <p class="text-xs text-gray-500">admin&#64;example.com</p>
      </div>
    </div>
  </div>
</aside>

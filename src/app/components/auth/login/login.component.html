<div class="min-h-screen bg-gradient-to-br from-blue-600 to-purple-600 flex items-center justify-center p-4 relative overflow-hidden">
  <!-- Animated Background Elements -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-white opacity-10 rounded-full blur-3xl animate-pulse"></div>
    <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-white opacity-10 rounded-full blur-3xl animate-pulse" style="animation-delay: 2s;"></div>
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-white opacity-5 rounded-full blur-3xl animate-pulse" style="animation-delay: 4s;"></div>
  </div>

  <!-- Login Container -->
  <div class="relative z-10 bg-white/95 backdrop-blur-lg rounded-3xl shadow-2xl w-full max-w-md p-8 border border-white/20 form-container">
    <!-- Logo and Title -->
    <div class="text-center mb-8">
      <div class="w-20 h-20 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg transform hover:scale-105 transition-transform duration-300">
        <i class="pi pi-music text-white text-3xl"></i>
      </div>
      <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent mb-2">Welcome to MelodyHub</h1>
      <p class="text-gray-100">Sign in to unlock your music journey</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="mb-6 animate-fade-in">
      <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg flex items-center">
        <i class="pi pi-exclamation-triangle mr-2"></i>
        <span class="text-sm">{{ errorMessage }}</span>
      </div>
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Email -->
      <div class="space-y-2">
        <label for="email" class="block text-sm font-semibold text-gray-100">Email Address</label>
        <div class="relative">
          <i class="pi pi-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 z-10 pointer-events-none"></i>
          <input
            pInputText
            id="email"
            type="email"
            [(ngModel)]="credentials.email"
            name="email"
            placeholder="Enter your email"
            class="w-full pl-10"
            [disabled]="isSubmitting || isLoading"
            required
          />
        </div>
      </div>

      <!-- Password -->
      <div class="space-y-2">
        <label for="password" class="block text-sm font-semibold text-gray-100">Password</label>
        <div class="relative">
          <i class="pi pi-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 z-10"></i>
          <p-password 
            id="password"
            [(ngModel)]="credentials.password"
            name="password"
            placeholder="Enter your password"
            [toggleMask]="true"
            [feedback]="false"
            class="w-full"
            inputClass="pl-10"
            [disabled]="isSubmitting || isLoading"
            required
          ></p-password>
        </div>
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input 
            type="checkbox" 
            id="remember" 
            [(ngModel)]="rememberMe"
            name="remember"
            class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded"
          >
          <label for="remember" class="ml-2 block text-sm text-gray-100">Remember me</label>
        </div>
        <button 
          type="button"
          (click)="onSwitchToReset()"
          class="text-sm text-blue-600 hover:text-blue-700 font-medium transition-colors"
        >
          Forgot password?
        </button>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="isSubmitting || isLoading"
        class="w-full h-12 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-200 disabled:opacity-60 disabled:cursor-not-allowed disabled:transform-none flex items-center justify-center gap-2"
      >
        <i *ngIf="isSubmitting || isLoading" class="pi pi-spinner pi-spin"></i>
        <span>{{ (isSubmitting || isLoading) ? 'Signing In...' : 'Sign In' }}</span>
      </button>
    </form>

    <!-- Demo Credentials -->
    <div class="mt-6 text-center">
      <button 
        type="button"
        (click)="fillDemoCredentials()"
        class="inline-flex items-center text-sm text-gray-100 hover:text-gray-300 font-medium transition-colors group"
      >
        <i class="pi pi-info-circle self-baseline group-hover:animate-pulse flex-shrink-0 "></i>
        Use demo credentials (john.doe&#64;example.com / password123)
      </button>
    </div>

    <!-- Divider -->
    <div class="relative my-8">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-gray-300"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="px-4 bg-white text-gray-500 font-medium">Or continue with</span>
      </div>
    </div>

    <!-- Social Login -->
    <div class="grid grid-cols-3 gap-3">
      <button
        type="button"
        class="social-btn google-btn"
        (click)="onSocialLogin('google')"
        [disabled]="isSubmitting || isLoading"
      >
        <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <span class="social-text">Google</span>
      </button>

      <button
        type="button"
        class="social-btn facebook-btn"
        (click)="onSocialLogin('facebook')"
        [disabled]="isSubmitting || isLoading"
      >
        <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        <span class="social-text">Facebook</span>
      </button>

      <button
        type="button"
        class="social-btn apple-btn"
        (click)="onSocialLogin('apple')"
        [disabled]="isSubmitting || isLoading"
      >
        <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="#000000" d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        <span class="social-text">Apple</span>
      </button>
    </div>

    <!-- Sign Up Link -->
    <div class="mt-8 text-center">
      <p class="text-gray-100">
        Don't have an account? 
        <button 
          type="button"
          (click)="onSwitchToRegister()"
          class="text-blue-600 hover:text-blue-700 font-semibold transition-colors"
        >
          Sign up for free
        </button>
      </p>
    </div>

    <!-- Footer Info -->
    <div class="mt-6 pt-6 border-t border-gray-200 text-center">
      <p class="text-xs text-gray-100">
        By signing in, you agree to our 
        <a href="#" class="text-blue-600 hover:text-blue-700">Terms of Service</a> 
        and 
        <a href="#" class="text-blue-600 hover:text-blue-700">Privacy Policy</a>
      </p>
    </div>
  </div>
</div>
